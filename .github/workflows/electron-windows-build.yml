name: Build Electron Windows

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    defaults:
      run:
        working-directory: electron

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      GYP_MSVS_VERSION: "2022"
      NEXT_PUBLIC_FAST_API: http://localhost:8000
      NEXT_PUBLIC_URL: http://localhost:3000
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            electron/package-lock.json
            servers/nextjs/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: servers/fastapi/uv.lock

      - name: Set up MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Verify Visual Studio toolchain
        shell: pwsh
        run: |
          where.exe cl
          cl

      - name: Clean build outputs
        shell: bash
        run: npm run clean:build

      - name: Install project dependencies
        shell: bash
        run: npm run setup:env

      - name: Build Electron TypeScript
        shell: bash
        run: npm run build:ts

      - name: Prepare PyInstaller
        shell: bash
        run: npm run install:pyinstaller

      - name: Build Next.js resources
        shell: bash
        run: npm run build:nextjs

      - name: Build FastAPI resources
        shell: bash
        run: npm run build:fastapi

      - name: Package Electron app
        shell: bash
        run: npm run build:electron

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: presenton-windows
          path: |
            electron/dist/**/*.exe
            electron/dist/**/*.msi
            electron/dist/**/*.appx
            electron/dist/**/*.blockmap
            electron/dist/latest*.yml
          if-no-files-found: error

      - name: Upload build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: presenton-windows-build-logs
          path: |
            C:\Users\runneradmin\AppData\Local\npm-cache\_logs\*.log
            electron/resources/**/*.log
          if-no-files-found: ignore
